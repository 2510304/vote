<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실팸 제2회 부방장 선거 - 최종본</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #6366f1; --success: #10b981; --error: #ef4444; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #1e293b; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; overflow: hidden; }
        .badge { position: absolute; top: 15px; right: 15px; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .badge-open { background: #dcfce7; color: #166534; }
        .badge-closed { background: #fee2e2; color: #991b1b; }
        h1 { font-size: 1.6rem; margin-bottom: 25px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; margin-bottom: 5px; }
        .btn-active { background: var(--main); color: white; }
        .btn-disabled { background: #e2e8f0; color: #94a3b8; pointer-events: none; }
        .btn-danger { background: #fee2e2; color: var(--error); border: 1px solid #fecaca; }
        .btn-admin { background: #1e293b; color: white; margin-top: 10px; }

        .candidate-card { border: 1.5px solid #f1f5f9; padding: 18px; border-radius: 15px; margin-top: 12px; position: relative; }
        .del-cand { position: absolute; top: 10px; right: 10px; color: #ccc; cursor: pointer; font-size: 0.8rem; border: none; background: none; }
        .del-cand:hover { color: red; }
        .c-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; }
        .c-promise { font-size: 0.9rem; color: #64748b; background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 15px; }

        .result-wrapper { margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 12px; }
        .bar-bg { background: #e2e8f0; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 8px; }
        .bar-fill { background: var(--main); height: 100%; width: 0%; transition: width 1s ease-in-out; }
        
        #admin-zone { display: none; border: 2px dashed var(--main); background: #f5f7ff; }
        .admin-trigger { margin-top: 40px; color: #cbd5e1; font-size: 0.7rem; cursor: pointer; border: none; background: none; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 실팸 제2회 부방장 선거</h1>

    <div id="admin-zone" class="card">
        <h2 style="color:var(--main)">🛠️ 방장 관리 패널</h2>
        
        <label style="font-size:0.8rem;">명단 입력 (쉼표 구분)</label>
        <textarea id="voter-list-input" rows="2" placeholder="닉네임1, 닉네임2"></textarea>
        <button class="btn btn-active" onclick="dbUpdateVoters()">명단 업데이트</button>

        <hr style="margin:20px 0; border:0.5px solid #e2e8f0;">
        
        <input type="text" id="cand-name" placeholder="후보자 이름">
        <textarea id="cand-promise" placeholder="후보자 공약"></textarea>
        <button class="btn btn-active" onclick="dbAddCandidate()">후보 등록</button>
        
        <hr style="margin:20px 0; border:0.5px solid #e2e8f0;">
        
        <button class="btn btn-admin" id="lock-btn" onclick="dbToggleLock()">투표 종료/시작</button>
        <button class="btn btn-danger" onclick="dbResetVotes()">⚠️ 투표 내역만 초기화</button>
        <button class="btn btn-danger" onclick="dbResetAll()">🔥 모든 데이터 완전 삭제</button>
        <p style="font-size:0.7rem; color:red; text-align:center;">* 완전 삭제 시 명단/후보/투표가 모두 지워집니다.</p>
    </div>

    <div id="main-card" class="card">
        <div id="status-badge" class="badge">연결 중...</div>
        <div id="auth-section">
            <h2 id="section-title">🗳️ 본인 인증</h2>
            <input type="text" id="voter-id" oninput="checkStatus()" placeholder="닉네임을 입력하세요">
            <div id="auth-feedback" style="font-size:0.85rem; margin-bottom:10px;"></div>
        </div>
        <div id="display-area"></div>
    </div>

    <button class="admin-trigger" onclick="checkAdmin()">Admin Management</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbyPtL0Xk98nhftTeALpMgWg4UksE0n-Y",
        authDomain: "silfam-election.firebaseapp.com",
        databaseURL: "https://silfam-election-default-rtdb.firebaseio.com",
        projectId: "silfam-election",
        storageBucket: "silfam-election.firebasestorage.app",
        messagingSenderId: "1082423958718",
        appId: "1:1082423958718:web:d0e09c333d263dd14c92ef",
        measurementId: "G-ZW5PBQJ3VF"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let state = { allowedVoters: [], votedUsers: {}, candidates: [], isLocked: false };

    db.ref('election').on('value', (snapshot) => {
        const data = snapshot.val();
        state = data ? {
            allowedVoters: data.allowedVoters || [],
            votedUsers: data.votedUsers || {},
            candidates: data.candidates || [],
            isLocked: data.isLocked || false
        } : { allowedVoters: [], votedUsers: {}, candidates: [], isLocked: false };
        updateBadge();
        checkStatus();
    });

    function updateBadge() {
        const badge = document.getElementById('status-badge');
        badge.innerText = state.isLocked ? "투표 종료" : "투표 진행 중";
        badge.className = `badge ${state.isLocked ? 'badge-closed' : 'badge-open'}`;
        document.getElementById('lock-btn').innerText = state.isLocked ? "투표 다시 시작하기" : "투표 종료하기";
    }

    function checkStatus() {
        const nameInput = document.getElementById('voter-id').value.trim();
        const feedback = document.getElementById('auth-feedback');
        const title = document.getElementById('section-title');
        
        if (state.isLocked) {
            feedback.innerHTML = "📢 투표가 종료되었습니다.";
            feedback.className = "text-success";
            title.innerHTML = "📊 최종 결과";
            renderResults();
            return;
        }

        if (!nameInput) {
            feedback.innerHTML = "닉네임을 입력해 주세요.";
            feedback.className = "";
            renderVoteList(false);
        } else if (!state.allowedVoters.includes(nameInput)) {
            feedback.innerHTML = "❌ 명단에 없는 이름입니다.";
            feedback.className = "text-error";
            renderVoteList(false);
        } else if (state.votedUsers[nameInput]) {
            feedback.innerHTML = "✅ 투표 완료! 실시간 결과입니다.";
            feedback.className = "text-success";
            title.innerHTML = "📊 실시간 현황";
            renderResults();
        } else {
            feedback.innerHTML = "✅ 인증 성공! 투표 가능합니다.";
            feedback.className = "text-success";
            title.innerHTML = "🗳️ 후보자 선택";
            renderVoteList(true);
        }
    }

    function renderVoteList(isActive) {
        const area = document.getElementById('display-area');
        area.innerHTML = '';
        if (state.candidates.length === 0) {
            area.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">후보자를 기다리는 중...</p>';
            return;
        }
        state.candidates.forEach(c => {
            area.innerHTML += `
                <div class="candidate-card">
                    <div class="c-name">👤 ${c.name}</div>
                    <div class="c-promise">${c.promise}</div>
                    <button class="btn ${isActive ? 'btn-active' : 'btn-disabled'}" onclick="castVote(${c.id})">투표하기</button>
                </div>`;
        });
    }

    // --- [IP 추적 핵심 기능 시작] ---
    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (e) { return "unknown"; }
    }

    async function castVote(id) {
        const voterName = document.getElementById('voter-id').value.trim();
        const candIndex = state.candidates.findIndex(c => c.id === id);
        
        if (candIndex !== -1) {
            const userIP = await getIP(); // IP 주소 획득
            const voteTime = new Date().toLocaleString(); // 투표 시간 기록

            state.candidates[candIndex].votes += 1;
            
            // 데이터베이스 업데이트
            db.ref('election/candidates').set(state.candidates);
            
            // 단순 true 대신 상세 정보 저장 (중복 체크 및 IP 기록용)
            db.ref(`election/votedUsers/${voterName}`).set({
                voted: true,
                candidate: state.candidates[candIndex].name,
                ip: userIP,
                time: voteTime
            });
            
            alert("투표 완료!");
        }
    }
    // --- [IP 추적 핵심 기능 끝] ---

    function renderResults() {
        const area = document.getElementById('display-area');
        const total = Object.keys(state.votedUsers).length;
        area.innerHTML = `<div style="text-align:center; font-size:0.8rem; color:#666; margin-bottom:10px;">참여: ${total}명 / 전체: ${state.allowedVoters.length}명</div>`;
        state.candidates.forEach(c => {
            const pct = total === 0 ? 0 : Math.round((c.votes / total) * 100);
            area.innerHTML += `
                <div class="result-wrapper">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.9rem;">
                        <span>${c.name}</span><span>${c.votes}표 (${pct}%)</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" style="width: ${pct}%"></div></div>
                </div>`;
        });
    }

    function dbUpdateVoters() {
        const list = document.getElementById('voter-list-input').value.split(',').map(v => v.trim()).filter(v => v !== "");
        db.ref('election/allowedVoters').set(list);
        alert("명단이 저장되었습니다.");
    }

    function dbAddCandidate() {
        const name = document.getElementById('cand-name').value;
        const promise = document.getElementById('cand-promise').value;
        if (!name || !promise) return alert("입력 오류!");
        const newList = [...state.candidates, { id: Date.now(), name, promise, votes: 0 }];
        db.ref('election/candidates').set(newList);
        document.getElementById('cand-name').value = ''; document.getElementById('cand-promise').value = '';
    }

    function dbResetVotes() {
        if (!confirm("투표 내역만 지우고 투표를 처음부터 다시 시작할까요?")) return;
        const resetCands = state.candidates.map(c => ({ ...c, votes: 0 }));
        db.ref('election/candidates').set(resetCands);
        db.ref('election/votedUsers').remove();
        alert("투표가 리셋되었습니다.");
    }

    function dbResetAll() {
        if (!confirm("정말 모든 데이터를 삭제할까요? 후보와 명단도 모두 사라집니다.")) return;
        db.ref('election').remove();
        alert("전체 데이터가 삭제되었습니다.");
    }

    function dbToggleLock() { db.ref('election/isLocked').set(!state.isLocked); }

    function checkAdmin() {
        if (prompt("관리자 비번") === "65184247") document.getElementById('admin-zone').style.display = 'block';
    }
</script>
</body>
</html>
