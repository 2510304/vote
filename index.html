<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실팸 부방장 선거 시스템 (IP 수집형)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* 기존 디자인 스타일 유지 */
        body { font-family: 'Pretendard', sans-serif; background: #f4f7f9; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .admin-link { margin-top: 50px; font-size: 12px; color: #ccc; cursor: pointer; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗳️ 제2회 부방장 선거</h2>
    <p>본인의 닉네임을 입력하고 투표해주세요.</p>
    <p style="font-size: 11px; color: #ff6b6b;">※ 중복 투표 방지를 위해 IP 주소가 기록됩니다.</p>
    
    <input type="text" id="voterName" placeholder="실팸 닉네임 입력">
    <div id="candidateList">
        </div>
    <button onclick="submitVote()">투표하기</button>
</div>

<a class="admin-link" onclick="location.href='admin.html'">Admin Management</a>

<script>
    // 1. Firebase 설정 (기존 설정값을 그대로 사용하세요)
    const firebaseConfig = {
        databaseURL: "https://silfam-election-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. 투표자의 IP 주소를 가져오는 함수
    async function getUserIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error("IP 가져오기 실패:", error);
            return "unknown";
        }
    }

    // 3. 투표 제출 함수
    async function submitVote() {
        const name = document.getElementById('voterName').value.trim();
        const selectedCandidate = document.querySelector('input[name="candidate"]:checked');
        
        if (!name) return alert("닉네임을 입력해주세요.");
        if (!selectedCandidate) return alert("후보를 선택해주세요.");

        const userIP = await getUserIP(); // IP 주소 획득
        const timestamp = new Date().toLocaleString();

        // Firebase에 저장 (닉네임, 선택후보, IP, 시간 포함)
        database.ref('votes/' + name).set({
            candidate: selectedCandidate.value,
            ip: userIP,
            time: timestamp
        }, (error) => {
            if (error) {
                alert("투표 실패: " + error.message);
            } else {
                alert("투표가 완료되었습니다! (기록된 IP: " + userIP + ")");
                location.reload();
            }
        });
    }
</script>
</body>
</html>
