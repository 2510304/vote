<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실팸 선거 보안 관리자 패널</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #auth-section { text-align: center; margin-top: 100px; }
        #admin-content { display: none; } /* 비밀번호 맞기 전까지 숨김 */
        input, button, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .bad { background-color: #ffebee; color: #d32f2f; }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h3>🔒 관리자 인증</h3>
        <input type="password" id="adminPw" placeholder="비밀번호를 입력하세요">
        <button onclick="checkPassword()">접속하기</button>
    </div>

    <div id="admin-content">
        <div class="card">
            <h3>👤 후보자 및 명단 관리</h3>
            <input type="text" id="candName" placeholder="후보자 이름">
            <button onclick="addCandidate()">후보 등록</button>
            <hr>
            <textarea id="voterListInput" placeholder="투표 가능 명단 (쉼표 구분)"></textarea>
            <button onclick="updateVoterList()" style="background: #28a745;">명단 업데이트</button>
        </div>

        <div class="card">
            <h3>📊 실시간 투표 및 IP 모니터링</h3>
            <div id="summary">데이터 로딩 중...</div>
            <table>
                <thead>
                    <tr><th>닉네임</th><th>선택</th><th>IP 주소</th><th>상태</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
            <button onclick="resetVotes()" style="background: #ff4d4d; margin-top: 20px;">⚠️ 투표 내역 전체 초기화</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://silfam-election-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // [보안] 비밀번호 체크 함수 (원하시는 번호로 수정 가능)
        function checkPassword() {
            const pw = document.getElementById('adminPw').value;
            if (pw === "1234") { // <--- 여기서 비밀번호를 변경하세요!
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                startMonitoring(); // 인증 성공 시 데이터 로딩 시작
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        function addCandidate() {
            const name = document.getElementById('candName').value;
            if(!name) return;
            db.ref('candidates/' + name).set({ promise: "" });
            alert("등록 완료");
        }

        function updateVoterList() {
            const list = document.getElementById('voterListInput').value.split(',').map(n => n.trim()).filter(n => n);
            db.ref('allowedVoters').set(list);
            alert("명단 업데이트 완료");
        }

        function resetVotes() {
            if(confirm("전체 삭제하시겠습니까?")) db.ref('votes').remove();
        }

        function startMonitoring() {
            db.ref().on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const listBody = document.getElementById('list');
                listBody.innerHTML = '';
                const votes = data.votes ? Object.entries(data.votes) : [];
                const ipMap = {};
                votes.forEach(([name, info]) => { if(info.ip) ipMap[info.ip] = (ipMap[info.ip] || 0) + 1; });
                votes.forEach(([name, info]) => {
                    const isDup = ipMap[info.ip] > 1;
                    listBody.innerHTML += `<tr class="${isDup ? 'bad' : ''}">
                        <td>${name}</td><td>${info.candidate}</td><td>${info.ip || '-'}</td><td>${isDup ? '⚠️ 중복의심' : '정상'}</td>
                    </tr>`;
                });
                document.getElementById('summary').innerText = `총 투표 수: ${votes.length}표`;
            });
        }
    </script>
</body>
</html>
