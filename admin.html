<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실팸 선거 관리자 패널 (공약 관리형)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #auth-section { text-align: center; margin-top: 100px; }
        #admin-content { display: none; }
        input, button, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .bad { background-color: #ffebee; color: #d32f2f; }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h3>🔒 관리자 인증</h3>
        <input type="password" id="adminPw" placeholder="비밀번호 입력">
        <button onclick="checkPassword()">접속</button>
    </div>

    <div id="admin-content">
        <div class="card">
            <h3>👤 후보자 및 공약 등록</h3>
            <input type="text" id="candName" placeholder="후보자 이름">
            <textarea id="candPromise" placeholder="공약 내용을 입력하세요 (예: 실팸 활성화, 매주 이벤트 진행 등)"></textarea>
            <button onclick="addCandidate()">후보 및 공약 등록</button>
            <div id="currentCandidates" style="margin-top:15px; font-size:0.9em;"></div>
        </div>

        <div class="card">
            <h3>📋 투표 권한 명단 업데이트</h3>
            <textarea id="voterListInput" placeholder="이름1, 이름2... (쉼표 구분)"></textarea>
            <button onclick="updateVoterList()" style="background: #28a745;">명단 저장</button>
        </div>

        <div class="card">
            <h3>📊 투표 로그 및 IP 체크</h3>
            <div id="summary">데이터 로딩 중...</div>
            <table>
                <thead>
                    <tr><th>닉네임</th><th>선택 후보</th><th>IP 주소</th><th>상태</th></tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
            <button onclick="resetVotes()" style="background: #ff4d4d; margin-top: 20px;">⚠️ 투표 내역 전체 초기화</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://silfam-election-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkPassword() {
            if (document.getElementById('adminPw').value === "6708") {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadRealtimeData();
            } else { alert("비밀번호 불일치"); }
        }

        // [핵심] 후보자 이름과 공약을 함께 저장
        function addCandidate() {
            const name = document.getElementById('candName').value.trim();
            const promise = document.getElementById('candPromise').value.trim();
            if(!name || !promise) return alert("이름과 공약을 모두 입력해주세요.");
            
            db.ref('candidates/' + name).set({
                name: name,
                promise: promise
            }).then(() => {
                alert(name + " 후보 등록 완료!");
                document.getElementById('candName').value = "";
                document.getElementById('candPromise').value = "";
            });
        }

        function updateVoterList() {
            const list = document.getElementById('voterListInput').value.split(',').map(n => n.trim()).filter(n => n);
            db.ref('allowedVoters').set(list);
            alert("명단 업데이트 완료");
        }

        function resetVotes() {
            if(confirm("모든 투표 기록을 삭제할까요?")) db.ref('votes').remove();
        }

        function loadRealtimeData() {
            db.ref().on('value', (snapshot) => {
                const data = snapshot.val() || {};
                
                // 후보 및 공약 목록 표시
                const candDiv = document.getElementById('currentCandidates');
                let candHtml = "<strong>등록된 후보:</strong><br>";
                if(data.candidates) {
                    Object.values(data.candidates).forEach(c => {
                        candHtml += `- <b>${c.name}</b>: ${c.promise}<br>`;
                    });
                } else { candHtml += "없음"; }
                candDiv.innerHTML = candHtml;

                // 투표 내역
                const listBody = document.getElementById('list');
                listBody.innerHTML = '';
                const votes = data.votes ? Object.entries(data.votes) : [];
                const ipMap = {};
                votes.forEach(([name, info]) => { if(info.ip) ipMap[info.ip] = (ipMap[info.ip] || 0) + 1; });
                votes.forEach(([name, info]) => {
                    const isDup = ipMap[info.ip] > 1;
                    listBody.innerHTML += `<tr class="${isDup ? 'bad' : ''}">
                        <td>${name}</td><td>${info.candidate}</td><td>${info.ip || '-'}</td><td>${isDup ? '⚠️ 중복의심' : '정상'}</td>
                    </tr>`;
                });
                document.getElementById('summary').innerText = `총 투표 수: ${votes.length}표`;
            });
        }
    </script>
</body>
</html>
